<div class="form-container">
  <h2>Enrollment Request Form</h2>

  <div *ngIf="submitted" class="success-message">
    Enrollment request submitted successfully!
  </div>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)" *ngIf="!submitted">
    <div class="form-group">
      <label for="studentName">Student Name</label>
      <input type="text" id="studentName" name="studentName" ngModel required minlength="3" #nameCtrl="ngModel">
      <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']" class="error-msg">Name is required</span>
      <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']" class="error-msg">Name must be at least 3 characters</span>
    </div>

    <div class="form-group">
      <label for="studentEmail">Student Email</label>
      <input type="email" id="studentEmail" name="studentEmail" ngModel required email #emailCtrl="ngModel">
      <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']" class="error-msg">Email is required</span>
      <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']" class="error-msg">Invalid email format</span>
    </div>

    <div class="form-group">
      <label for="courseId">Course ID</label>
      <input type="number" id="courseId" name="courseId" ngModel required #courseIdCtrl="ngModel">
      <span *ngIf="courseIdCtrl.touched && courseIdCtrl.errors?.['required']" class="error-msg">Course ID is required</span>
    </div>

    <div class="form-group">
      <label for="preferredSemester">Preferred Semester</label>
      <select id="preferredSemester" name="preferredSemester" ngModel required #semesterCtrl="ngModel">
        <option value="" disabled>Select a semester</option>
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
      <span *ngIf="semesterCtrl.touched && semesterCtrl.errors?.['required']" class="error-msg">Please select a semester</span>
    </div>

    <div class="form-group checkbox-group">
      <label>
        <input type="checkbox" name="agreeToTerms" ngModel required #termsCtrl="ngModel">
        I agree to the terms and conditions
      </label>
      <span *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']" class="error-msg">You must agree to the terms</span>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="enrollForm.invalid" class="primary">Submit</button>
      <button type="button" class="secondary" (click)="enrollForm.resetForm()">Reset</button>
    </div>
  </form>
</div>
