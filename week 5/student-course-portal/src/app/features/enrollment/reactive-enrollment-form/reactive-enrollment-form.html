<div class="form-container">
  <h2>Reactive Enrollment Form</h2>

  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="studentName">Student Name</label>
      <input type="text" id="studentName" formControlName="studentName">
      <span *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['required']" class="error-msg">Name is required</span>
      <span *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['minlength']" class="error-msg">Name must be at least 3 characters</span>
    </div>

    <div class="form-group">
      <label for="studentEmail">Student Email</label>
      <input type="email" id="studentEmail" formControlName="studentEmail">
      <span *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['required']" class="error-msg">Email is required</span>
      <span *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['email']" class="error-msg">Invalid email format</span>
      <span *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['emailTaken']" class="error-msg">Email taken</span>
      <span *ngIf="enrollForm.get('studentEmail')?.pending" class="loading-msg">Checking email availability...</span>
    </div>

    <div class="form-group">
      <label for="courseId">Course ID</label>
      <input type="text" id="courseId" formControlName="courseId">
      <span *ngIf="enrollForm.get('courseId')?.touched && enrollForm.get('courseId')?.errors?.['required']" class="error-msg">Course ID is required</span>
      <span *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']" class="error-msg">Course code starting with XX is not allowed.</span>
    </div>

    <div class="form-group">
      <label for="preferredSemester">Preferred Semester</label>
      <select id="preferredSemester" formControlName="preferredSemester">
        <option value="" disabled>Select a semester</option>
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
      <span *ngIf="enrollForm.get('preferredSemester')?.touched && enrollForm.get('preferredSemester')?.errors?.['required']" class="error-msg">Please select a semester</span>
    </div>

    <div class="form-group" formArrayName="additionalCourses">
      <div class="header-with-action">
        <label>Additional Courses</label>
        <button type="button" class="secondary small" (click)="addCourse()">Add Another Course</button>
      </div>
      <div *ngFor="let ctrl of additionalCourses.controls; let i=index" class="dynamic-control-row">
        <input type="text" [formControlName]="i" placeholder="Additional Course Code">
        <button type="button" class="danger small" (click)="removeCourse(i)">Remove</button>
      </div>
    </div>

    <div class="form-group checkbox-group">
      <label>
        <input type="checkbox" formControlName="agreeToTerms">
        I agree to the terms and conditions
      </label>
      <span *ngIf="enrollForm.get('agreeToTerms')?.touched && enrollForm.get('agreeToTerms')?.errors?.['required']" class="error-msg">You must agree to the terms</span>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="enrollForm.invalid" class="primary">Submit</button>
    </div>
  </form>
</div>
